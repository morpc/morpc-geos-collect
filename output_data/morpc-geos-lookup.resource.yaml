  workflow.  Identifiers are included for the following geographies: REGION7, REGION15,
  REGIONCORPO, REGIONCEDS, CBSA, JURIS-COUNTY, COUNTY, JURIS-MORPC, COUNTY-COUSUB,
  REGIONONECBUS, REGIONMPO-MORPC, COUNTY-MORPC, JURIS-COUNTY-MORPC, JURIS, COUNTY-TOWNSHIP-REMAINDER,
  REGIONTDM-MORPC, REGION10, UNSD, REGIONSWACO, PLACE-COUNTY, PLACE'
